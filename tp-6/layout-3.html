<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 3</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .caja{
            height:100px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .s1{background:#c9a178;}
        .s2{background:#c9c06a;}
        .s3{background:#a5c45a;}
        .s4{background:#75c773;}
        .s5{background:#7fd0b2;}
        .s6{background:#74afd1;}
    </style>
</head>
<body>

<div class="container mt-4">

    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4 s1 caja">Sección 1</div>
    </div>

    <div class="row">
        <div class="col-12 col-md-4 col-lg-3 order-lg-3 s2 caja">Sección 2</div>
        <div class="col-12 col-md-4 col-lg-5 order-lg-2 s3 caja">Sección 3</div>
        <div class="col-12 col-md-4 col-lg-3 order-lg-1 s4 caja">Sección 4</div>
    </div>

    <div class="row">
        <div class="col-12 col-md-6 col-lg-3 s6 caja">Sección 6</div>
        <div class="col-12 col-md-6 offset-lg-6 col-lg-3 s5 caja">Sección 5</div>
    </div>

</div>

</body>
</html>
